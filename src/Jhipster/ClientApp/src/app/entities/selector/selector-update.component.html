<div class="row justify-content-center">
    <div class="col-8">
        <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
            <h2 id="jhi-selector-heading" jhiTranslate="jhipsterApp.selector.home.createOrEditLabel">Create or edit a Selector</h2>

            <div>
                <jhi-alert-error></jhi-alert-error>

                <div class="form-group" [hidden]="!editForm.get('id')!.value">
                    <label for="id" jhiTranslate="global.field.id">ID</label>
                    <input type="text" class="form-control" id="id" name="id" formControlName="id" readonly />
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="jhipsterApp.selector.name" for="field_name">Name</label>
                    <input type="text" class="form-control" name="name" id="field_name"
                           formControlName="name"/>
                </div>


                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="jhipsterApp.selector.rulesetName" for="field_rulesetName">Ruleset Name</label>
                    <select class="form-control" id="field_rulesetName" name="rulesetName" formControlName="rulesetName">
                        <option [ngValue]="rulesetOption.name" *ngFor="let rulesetOption of rulesets">{{ rulesetOption.name }}</option>
                    </select>
                </div>


                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="jhipsterApp.selector.action" for="field_action">Action</label>
                    <input type="text" class="form-control" name="action" id="field_action"
                           formControlName="action"/>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="jhipsterApp.selector.actionParameter" for="field_actionParameter">Description</label>
                    <input type="text" class="form-control" name="actionParameter" id="field_actionParameter"
                           formControlName="actionParameter"/>
                </div>

                <div class="form-group">
                    <label class="form-control-label" jhiTranslate="jhipsterApp.selector.description" for="field_description">Description</label>
                    <input type="text" class="form-control" name="description" id="field_description"
                           formControlName="description"/>
                </div>
            </div>

            <div>
                <button type="button" id="cancel-save" class="btn btn-secondary" (click)="previousState()">
                    <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
                </button>

                <button type="submit" id="save-entity" [disabled]="editForm.invalid || isSaving" class="btn btn-primary">
                    <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
                </button>
            </div>
        </form>
    </div>
</div>
