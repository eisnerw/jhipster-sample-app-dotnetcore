<div>
    <h2 id="page-heading">
        <span jhiTranslate="jhipsterApp.selector.home.title">Selectors</span>

        <button id="jh-create-entity" class="btn btn-primary float-right jh-create-entity create-selector" [routerLink]="['/selector/new']">
            <fa-icon icon="plus"></fa-icon>
            <span  jhiTranslate="jhipsterApp.selector.home.createLabel">
            Create a new Selector
            </span>
        </button>
    </h2>

    <jhi-alert-error></jhi-alert-error>

    <jhi-alert></jhi-alert>

    <div class="alert alert-warning" id="no-result" *ngIf="selectors?.length === 0">
        <span jhiTranslate="jhipsterApp.selector.home.notFound">No selectors found</span>
    </div>

    <div class="table-responsive" id="entities" *ngIf="selectors && selectors.length > 0">
        <table class="table table-striped" aria-describedby="page-heading">
            <thead>
                <tr>
                    <th scope="col" ><span jhiTranslate="global.field.id">ID</span></th>
                    <th scope="col" ><span jhiTranslate="jhipsterApp.selector.name">Name</span></th>
                    <th scope="col" ><span jhiTranslate="jhipsterApp.selector.rulesetName">Ruleset Name</span></th>
                    <th scope="col" ><span jhiTranslate="jhipsterApp.selector.action">Action</span></th>
                    <th scope="col" ><span jhiTranslate="jhipsterApp.selector.actionParameter">Action Parameter</span></th>
                    <th scope="col" ><span jhiTranslate="jhipsterApp.selector.description">Country</span></th>
                    <th scope="col"></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let selector of selectors ;trackBy: trackId">
                    <td><a [routerLink]="['/selector', selector.id, 'view']">{{ selector.id }}</a></td>
                    <td>{{ selector.name }}</td>
                    <td>{{ selector.rulesetName }}</td>
                    <td>{{ selector.action }}</td>
                    <td>{{ selector.actionParameter }}</td>
                    <td>{{ selector.description }}</td>
                    <td class="text-right">
                        <div class="btn-group">
                            <button type="submit"
                                    [routerLink]="['/selector', selector.id, 'view']"
                                    class="btn btn-info btn-sm">
                                <fa-icon icon="eye"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                            </button>

                            <button type="submit"
                                    [routerLink]="['/selector', selector.id, 'edit']"
                                    class="btn btn-primary btn-sm">
                                <fa-icon icon="pencil-alt"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                            </button>

                            <button type="submit" (click)="delete(selector)"
                                    class="btn btn-danger btn-sm">
                                <fa-icon icon="times"></fa-icon>
                                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
